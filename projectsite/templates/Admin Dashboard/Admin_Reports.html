{% extends "base.html" %}

{% block title %}
    Reports
{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/admin-dashboard-style.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
{% endblock %}

{% block content %}
    <div class="content" id="content">
        <div class="title">
            <h2>Analytics & Reports</h2>
            <div class="top-bar">
                <!-- Notification Bell -->
                <a href="Announcements.html" class="text-decoration-none">
                    <img src="{% static 'images/notification.png' %}" alt="Notifications" width="30" height="30">
                    <span class="position-absolute top-0 start-100 translate-middle bg-danger"> </span>
                </a>
            </div>
        </div>
        <hr>
        <small><span id="date"></span></small>
        <br>
        <br>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script src="{% static 'javascript/base.js' %}"></script>
{% endblock %}
