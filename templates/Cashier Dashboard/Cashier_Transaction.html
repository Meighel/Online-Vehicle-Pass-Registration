<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="../../static/css/CashierPayment.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> <!--FOR MODALS-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div id="sidebar-container"></div>
    
        <!-- Main Content -->
    <div class="content" id="content">
        <div class="title">
            <h2>PAYMENT STATUS FOR VEHICLE APPLICATION</h2>
            <div class="top-bar">
                <!-- Notification Bell -->
                <a href="Announcements.html" class="text-decoration-none text-light">
                    <img src="../../static/images/notification.png" alt="Notifications" width="30" height="30">
                    <span class="position-absolute top-0 start-100 translate-middle bg-danger"> </span>
                </a>
            </div>
        </div>
        <hr>
        <small><span id="real-time-date"></span></small>
    </br>

        <!-- Filter Section -->
        <div class="filter-container">
                        
            <input type="text" id="search-bar" placeholder="🔍 Search">
        </div>
 

        <!-- Payments Record Table -->
        <section class="table-container">
            <table class="payments-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Username</th>
                        <th>Status</th>
                        <th>Remarks</th>
                        <th>Processed by</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>                 
            </table>
        </section>

        <!-- Update Status Modal -->
        <div class="modal fade" id="statusModal" tabindex="-1" aria-labelledby="statusModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="statusModalLabel">Update Status</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>Are you sure you want to update this user's status?</p>
                        <input type="hidden" id="rowIndex">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" id="rejectBtn">Reject</button>
                        <button type="button" class="btn btn-success" id="approveBtn">Approve</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Entries Info -->
        <div class="entries-info mt-2">Showing 0 entries</div>

        <!-- Pagination -->
        <div class="pagination-container">
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <script src="../../static/javascript/Cashier_Dashboard.js"></script>
    <script src="../../static/javascript/Cashier_Payment.js"></script>
</body>
</html>
